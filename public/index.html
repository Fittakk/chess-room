<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chess Room</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="page">
    <div class="left-panel">
      <div class="board-card">
        <div class="player-top">Black: <span id="blackName">Waiting...</span></div>
        <div id="board"></div>
        <div class="player-bottom">White: <span id="whiteName">Waiting...</span></div>
      </div>
    </div>

    <div class="right-panel">
      <div class="hero-box">
        <div class="mini-top">
          <div class="room-badge" id="roomText">Room: -</div>
          <div class="role-badge" id="role">You are: spectator</div>
        </div>

        <div class="info-box" id="spectators">Spectators: none</div>
        <div class="info-box" id="gameStatus">Game status: In progress</div>
<div class="info-box">
  <button onclick="startNewGame()">New Game</button>
</div>
        

        <div class="chat-card">
          <div id="chatBox"></div>

          <div class="chat-row">
            <input id="chatInput" placeholder="Shkruaj..." />
            <button onclick="sendMsg()">Send</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chess.js"></script>
  <script src="app.js"></script>

  <!-- Audio Effects -->
  <audio id="moveSound" preload="auto">
    <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.wav" type="audio/wav">
  </audio>
  <audio id="captureSound" preload="auto">
    <source src="https://www.soundjay.com/misc/sounds/bell-ringing-04.wav" type="audio/wav">
  </audio>
  <audio id="checkSound" preload="auto">
    <source src="https://www.soundjay.com/misc/sounds/bell-ringing-03.wav" type="audio/wav">
  </audio>
  <audio id="checkmateSound" preload="auto">
    <source src="https://www.soundjay.com/misc/sounds/bell-ringing-02.wav" type="audio/wav">
  </audio>
</body>
</html>
